project:
  type: website
  output-dir: report
  render:
    - index.qmd
    - resources/01-essential/03-scripts/02-quarto/01-full-version/tab1-metodologia/metodologia.qmd
    - resources/01-essential/03-scripts/02-quarto/01-full-version/tab2-resumen/tab2-1-resumen-16S/resumen.qmd
    - resources/01-essential/03-scripts/02-quarto/01-full-version/tab3-analisis/tab3-1-analisis-16S/00-contexto.qmd
    - resources/01-essential/03-scripts/02-quarto/01-full-version/tab3-analisis/tab3-1-analisis-16S/01-revision-inicial.qmd
    - resources/01-essential/03-scripts/02-quarto/01-full-version/tab3-analisis/tab3-1-analisis-16S/02-control-calidad.qmd
    - resources/01-essential/03-scripts/02-quarto/01-full-version/tab3-analisis/tab3-1-analisis-16S/03-generacion-asvs.qmd
    - resources/01-essential/03-scripts/02-quarto/01-full-version/tab3-analisis/tab3-1-analisis-16S/04-taxonomia-filogenia.qmd
    - resources/01-essential/03-scripts/02-quarto/01-full-version/tab3-analisis/tab3-1-analisis-16S/05-analisis-diferencial.qmd
    - resources/01-essential/03-scripts/02-quarto/01-full-version/tab3-analisis/tab3-1-analisis-16S/06-diversidad-microbiana.qmd
    - resources/01-essential/03-scripts/02-quarto/01-full-version/tab3-analisis/tab3-1-analisis-16S/07-prediccion-funcional.qmd
    - resources/01-essential/03-scripts/02-quarto/01-full-version/tab3-analisis/tab3-1-analisis-16S/08-conclusiones.qmd

resources:
  - resources/**
  - '!resources/01-essential/03-scripts/01-r/'
  - '!resources/01-essential/03-scripts/05-python/'

format:
  html:
    css: resources/01-essential/03-scripts/03-css/styles.css
    theme: lux
    toc: false
    code-fold: false
    code-tools: false
    number-sections: false
    page-layout: custom
    smooth-scroll: true
    highlight-style: a11y-dark
    self-contained: false
    copy-files: true
    html: true

include-in-header:
  text: |-
    <link rel="shortcut icon" href="resources/01-essential/01-images/icons/favicon.svg"/>
    <link rel="icon" type="image/x-icon" href="resources/01-essential/01-images/icons/favicon.ico">

execute:
  echo: false
  warning: false
  message: false
  freeze: false
  cache: true

params:
  project_path: ''
  amplicon_type: ''
  report_version: ''

website:
  navbar:
    title: |-
      <img class='brand-logo' src='/resources/01-essential/01-images/icons/ipbln.png'>
      <a class='brand-text' href='https://www.ipb.csic.es/servicios/Bioinformatica/index.html'>IPBLN</a>
    right:
      - text: Inicio
        icon: house
        href: "index.qmd"
      - text: Metodología
        icon: wrench
        href: "resources/01-essential/03-scripts/02-quarto/01-full-version/tab1-metodologia/metodologia.qmd"
      - text: Resumen 16S
        icon: clipboard-data
        href: "resources/01-essential/03-scripts/02-quarto/01-full-version/tab2-resumen/tab2-1-resumen-16S/resumen.qmd"
      - text: Análisis 16S
        icon: bar-chart
        menu:
          - text: ➤ Introducción contextual
            href: "resources/01-essential/03-scripts/02-quarto/01-full-version/tab3-analisis/tab3-1-analisis-16S/00-contexto.qmd"
          - text: 1. Revisión inicial de muestras y metadatos
            href: "resources/01-essential/03-scripts/02-quarto/01-full-version/tab3-analisis/tab3-1-analisis-16S/01-revision-inicial.qmd"
          - text: 2. Control de calidad y preprocesamiento
            href: "resources/01-essential/03-scripts/02-quarto/01-full-version/tab3-analisis/tab3-1-analisis-16S/02-control-calidad.qmd"
          - text: 3. Generación de ASVs y tabla de abundancia
            href: "resources/01-essential/03-scripts/02-quarto/01-full-version/tab3-analisis/tab3-1-analisis-16S/03-generacion-asvs.qmd"
          - text: 4. Asignación taxonómica y filogenia
            href: "resources/01-essential/03-scripts/02-quarto/01-full-version/tab3-analisis/tab3-1-analisis-16S/04-taxonomia-filogenia.qmd"
          - text: 5. Análisis diferencial de abundancia
            href: "resources/01-essential/03-scripts/02-quarto/01-full-version/tab3-analisis/tab3-1-analisis-16S/05-analisis-diferencial.qmd"
          - text: 6. Diversidad microbiana
            href: "resources/01-essential/03-scripts/02-quarto/01-full-version/tab3-analisis/tab3-1-analisis-16S/06-diversidad-microbiana.qmd"
          - text: 7. Predicción funcional
            href: "resources/01-essential/03-scripts/02-quarto/01-full-version/tab3-analisis/tab3-1-analisis-16S/07-prediccion-funcional.qmd"
          - text: 8. Conclusiones y perspectivas
